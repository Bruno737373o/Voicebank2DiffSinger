name: UTAU to DiffSinger (MakeDiffSinger Official)

on:
  workflow_dispatch:

jobs:
  build-and-process:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install uv
          # O MakeDiffSinger precisa dessas bibliotecas base
          uv pip install --system -r requirements.txt requests tqdm

      - name: Auto-generate TXT from OTO.INI
        shell: python
        run: |
          import os
          import sys
          sys.stdout.reconfigure(encoding='utf-8')

          # Pasta do banco de voz
          path = "Kasane Teto SV"
          oto_path = os.path.join(path, "oto.ini")
          
          if not os.path.exists(oto_path):
              print(f"Erro: Arquivo '{oto_path}' nao encontrado!")
              exit(1)

          with open(oto_path, 'r', encoding='shift-jis', errors='ignore') as f:
              for line in f:
                  if '=' in line:
                      parts = line.split('=')
                      filename = parts[0]
                      alias = parts[1].split(',')[0].strip()
                      # Extrai o fonema (ex: "- あ" -> "あ")
                      phoneme = alias.split(' ')[-1]
                      
                      txt_name = os.path.splitext(filename)[0] + ".txt"
                      with open(os.path.join(path, txt_name), 'w', encoding='utf-8') as tf:
                          tf.write(phoneme)
          print("Sucesso: Arquivos de transcricao (.txt) criados.")

      - name: Download Aligner Models
        shell: python
        run: |
          import requests
          import os

          # O MakeDiffSinger geralmente procura os modelos em 'checkpoints' ou 'src/ckpt'
          # Usaremos o modelo estável do ds_aligner hospedado no Hugging Face
          files = {
              "checkpoints/ds_aligner.ckpt": "https://huggingface.co/datasets/Kalm08/DiffSinger_Japanese_Base_Model/resolve/main/model_ckpt_steps_100000.ckpt",
              "dictionaries/kana_jp.txt": "https://raw.githubusercontent.com/openvpi/MakeDiffSinger/main/dictionaries/kana_jp.txt"
          }

          for path, url in files.items():
              os.makedirs(os.path.dirname(path), exist_ok=True)
              print(f"Baixando {path}...")
              r = requests.get(url, allow_redirects=True)
              if r.status_code == 200:
                  with open(path, 'wb') as f:
                      f.write(r.content)
              else:
                  print(f"Erro ao baixar {url}")
                  exit(1)

      - name: Run MakeDiffSinger
        shell: pwsh
        run: |
          # No MakeDiffSinger, o comando costuma ser python main.py [caminho_da_pasta]
          # Enviamos "1" e "y" para as perguntas de setup se elas aparecerem
          "1`ny`ny`ny" | python main.py "Kasane Teto SV"

      - name: Upload Dataset
        uses: actions/upload-artifact@v4
        with:
          name: diffsinger-dataset-final
          path: out/
          retention-days: 7
