name: UTAU to DiffSinger (Dataset Tools Release)

on:
  workflow_dispatch:

jobs:
  build-and-process:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Extract Dataset Tools
        shell: pwsh
        run: |
          Write-Host "Baixando release do Dataset Tools..."
          $Url = "https://github.com/openvpi/dataset-tools/releases/download/GAME-0330/dataset-tools-msvc2022-x64-2026-03-30-eccd43e.zip"
          curl.exe -L $Url -o "tools.zip"
          
          Write-Host "Extraindo ferramentas..."
          Expand-Archive -Path "tools.zip" -DestinationPath "bin"
          
          # Remove o zip para economizar espaço
          Remove-Item "tools.zip"

      - name: Auto-generate TXT for Aligner
        shell: python
        run: |
          import os
          import sys
          sys.stdout.reconfigure(encoding='utf-8')

          # Caminho onde sua Teto está no repositório
          path = "Kasane Teto SV"
          
          if not os.path.exists(path):
              print(f"Erro: Pasta '{path}' nao encontrada!")
              exit(1)

          # Gera os TXTs a partir do OTO.ini para o alinhador entender os áudios
          oto_path = os.path.join(path, "oto.ini")
          with open(oto_path, 'r', encoding='shift-jis', errors='ignore') as f:
              for line in f:
                  if '=' in line:
                      parts = line.split('=')
                      filename = parts[0]
                      alias = parts[1].split(',')[0].strip()
                      phoneme = alias.split(' ')[-1]
                      
                      txt_name = os.path.splitext(filename)[0] + ".txt"
                      with open(os.path.join(path, txt_name), 'w', encoding='utf-8') as tf:
                          tf.write(phoneme)
          print("Arquivos de transcrição gerados com sucesso.")

      - name: Run Processing
        shell: pwsh
        run: |
          # Movemos a pasta da Teto para dentro da pasta 'bin' onde os executáveis estão
          Move-Item -Path "Kasane Teto SV" -Destination "bin/"
          
          cd bin
          
          # Como este é um binário pré-compilado, chamamos o executável diretamente.
          # Nota: O nome do executável pode variar (ex: dataset-tools.exe ou run.exe)
          # Ajuste o nome abaixo conforme o que existe dentro do zip da release.
          # Se houver prompts, o "1`ny`ny" continua funcionando.
          "1`ny`ny`ny" | ./dataset-tools.exe "Kasane Teto SV"

      - name: Upload Processed Dataset
        uses: actions/upload-artifact@v4
        with:
          name: diffsinger-dataset-final
          # Ajuste o caminho conforme a pasta de saída gerada pela ferramenta (ex: bin/out)
          path: bin/out/
          retention-days: 7
