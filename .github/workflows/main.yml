name: UTAU to DiffSinger Auto-Converter

on:
  workflow_dispatch:

jobs:
  build-and-convert:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install --system -r requirements.txt requests

      - name: Auto-generate TXT from OTO.INI
        shell: python
        run: |
          import os
          import sys
          sys.stdout.reconfigure(encoding='utf-8')

          path = "Kasane Teto SV"
          oto_path = os.path.join(path, "oto.ini")
          
          if not os.path.exists(oto_path):
              print(f"Erro: Pasta '{path}' nao encontrada!")
              exit(1)

          files_content = {}
          with open(oto_path, 'r', encoding='shift-jis', errors='ignore') as f:
              for line in f:
                  if '=' in line:
                      parts = line.split('=')
                      filename = parts[0]
                      data = parts[1].split(',')
                      alias = data[0].strip()
                      syllable = alias.split(' ')[-1]
                      if filename not in files_content:
                          files_content[filename] = []
                      files_content[filename].append(syllable)

          for filename, syllables in files_content.items():
              base_name = os.path.splitext(filename)[0]
              txt_path = os.path.join(path, f"{base_name}.txt")
              with open(txt_path, 'w', encoding='utf-8') as f:
                  f.write(" ".join(syllables))
          print("Sucesso: Arquivos .txt gerados.")

      - name: Download SOFA Models (OpenVPI Links)
        shell: python
        run: |
          import requests
          import os

          def download_file(url, dest):
              print(f"Baixando: {url}")
              os.makedirs(os.path.dirname(dest), exist_ok=True)
              # O parâmetro allow_redirects=True é crucial para o GitHub
              r = requests.get(url, allow_redirects=True, stream=True)
              if r.status_code == 200:
                  with open(dest, 'wb') as f:
                      for chunk in r.iter_content(chunk_size=8192):
                          f.write(chunk)
                  print(f"Salvo: {dest} ({os.path.getsize(dest)} bytes)")
              else:
                  print(f"Erro {r.status_code} ao baixar de: {url}")
                  exit(1)

          # Novos links oficiais e estáveis
          ckpt_url = "https://github.com/openvpi/MakeDiffSinger/releases/download/v0.0.1/base.ckpt"
          dict_url = "https://raw.githubusercontent.com/openvpi/MakeDiffSinger/main/dictionaries/kana_jp.txt"

          # O script espera o nome step.100000.ckpt, então vamos renomear o base.ckpt no download
          download_file(ckpt_url, "src/ckpt/step.100000.ckpt")
          download_file(dict_url, "src/dictionaries/japanese-extension-sofa.txt")

      - name: Run Conversion
        shell: pwsh
        run: |
          # Respostas: 1 (SOFA), y (Normalize), y (Trim), y (Confirm)
          "1`ny`ny`ny" | python src/main.py "Kasane Teto SV"

      - name: Upload Dataset
        uses: actions/upload-artifact@v4
        with:
          name: diffsinger-dataset-output
          path: src/outputs/
          retention-days: 7
        
